# Nginx reverse proxy config for Telegram Viewer
#
# INSTALL:
#   cp nginx.conf /etc/nginx/sites-available/tgviewer
#   ln -s /etc/nginx/sites-available/tgviewer /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# OPTIONAL — free HTTPS via Let's Encrypt:
#   certbot --nginx -d your-domain.com

server {
    listen 80;
    # ⚠ Replace with your domain or VPS IP
    server_name your-domain.com;

    # Max upload size (for session string paste etc.)
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for Server-Sent Events (export progress stream)
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Keep-alive to backend
        proxy_set_header Connection "";
    }

    # Serve preserved media directly via nginx (faster, bypasses Flask)
    # ⚠ Change /opt/tgviewer to your actual project path
    location /preserved_media/ {
        alias /opt/tgviewer/preserved_media/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /server_downloads/ {
        alias /opt/tgviewer/server_downloads/;
        expires 1d;
    }
}
