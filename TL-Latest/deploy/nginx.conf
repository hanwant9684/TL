# Nginx reverse proxy config for Telegram Viewer
#
# INSTALL:
#   sudo cp nginx.conf /etc/nginx/sites-available/tgviewer
#   sudo ln -sf /etc/nginx/sites-available/tgviewer /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# OPTIONAL — free HTTPS via Let's Encrypt:
#   sudo apt-get install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d your-domain.com

server {
    listen 80;
    # ⚠ Replace with your domain or VPS IP
    server_name your-domain.com;

    client_max_body_size 50M;

    # All traffic goes through Flask — auth is enforced there.
    # Media files (preserved_media, server_downloads) are NOT served directly
    # by nginx; they pass through Flask so the session check applies.
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for Server-Sent Events (export progress stream)
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Keep-alive to backend
        proxy_set_header Connection "";
    }
}
