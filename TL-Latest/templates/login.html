<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Viewer — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0e1621; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #17212b; border-radius: 12px; padding: 40px 36px; width: 100%; max-width: 380px; box-shadow: 0 8px 40px rgba(0,0,0,0.5); }
        .logo { text-align: center; margin-bottom: 24px; }
        .logo svg { filter: drop-shadow(0 0 12px rgba(82,136,193,0.4)); }
        h1 { text-align: center; font-size: 1.4rem; font-weight: 600; margin-bottom: 6px; }
        .sub { text-align: center; color: #6c7883; font-size: 0.875rem; margin-bottom: 28px; }
        .field { margin-bottom: 16px; }
        label { display: block; font-size: 0.8rem; color: #6c7883; margin-bottom: 6px; }
        input[type=password] { width: 100%; background: #0e1621; border: 1px solid #2a3a4a; border-radius: 8px; padding: 11px 14px; color: #fff; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
        input[type=password]:focus { border-color: #5288c1; }
        .btn { width: 100%; background: #5288c1; border: none; border-radius: 8px; padding: 12px; color: #fff; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 4px; }
        .btn:hover { background: #4a7ab5; }
        .error { background: rgba(231,76,60,0.15); border: 1px solid rgba(231,76,60,0.3); color: #e74c3c; border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; margin-bottom: 16px; }
        .notice { margin-top: 20px; color: #6c7883; font-size: 0.78rem; text-align: center; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
                <circle cx="28" cy="28" r="28" fill="#2b5278"/>
                <path d="M12 28.5l9 9L44 18" stroke="#5288c1" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <h1>Telegram Viewer</h1>
        <p class="sub">Enter your password to continue</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/login">
            <div class="field">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="••••••••" required autofocus>
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>
        <p class="notice">Protected access. After 5 failed attempts you'll be locked out for 5 minutes.</p>
    </div>
</body>
</html>
